context:
  compression_threshold: 50
  max_experiments_in_context: 20
experiment:
  batch_size: 5
  convergence_threshold: 0.95
  max_iterations: 5
  min_improvement: 0.01
  parallel_candidates: 3
  parallel_enabled: false
  parallel_workers: 3
metric:
  target_score: 0.95
  type: accuracy
optimizer_llm:
  api_base: https://openrouter.ai/api/v1
  api_key: null
  backend: openrouter
  max_tokens: 2048
  model: meta-llama/llama-3.1-8b-instruct
  temperature: 0.7
storage:
  checkpoint_interval: 10
  dataset_file: generated_dataset.json
  ledger_file: experiment_ledger.json
  results_dir: results
target_llm:
  api_base: https://openrouter.ai/api/v1
  api_key: null
  backend: openrouter
  max_tokens: 128
  model: mistralai/mistral-nemo
  temperature: 0.1
task:
  description: Classify text into positive or negative sentiment
  initial_prompt: Analyze the sentiment of the following text and respond with only
    "positive" or "negative".
  name: text_classification
