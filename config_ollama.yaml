# AutoPrompter Configuration for Ollama Backend
# Uses local Ollama server for both optimizer and target LLMs

# Optimizer LLM Configuration (Ollama)
optimizer_llm:
  model: "google/gemini-3-flash-preview"
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.7
  max_tokens: 4096

# Target LLM Configuration (Ollama)
target_llm:
  backend: "ollama"  # Use Ollama backend
  model: "qwen3.5:0.8b"  # Can be same or different model
  host: "http://localhost"
  port: 11434
  temperature: 0.1
  max_tokens: 2048
  timeout: 120
  min_request_interval: 0.1

# Experiment Configuration
experiment:
  max_iterations: 10
  convergence_threshold: 0.95
  min_improvement: 0.01
  batch_size: 50

# Task Definition
task:
  name: "text_classification"
  description: "Classify text into positive or negative sentiment"
  initial_prompt: "Analyze the sentiment of the following text and respond with only 'positive' or 'negative'."

# Metric Configuration
metric:
  type: "accuracy"  # accuracy, f1, exact_match, contains, semantic_similarity
  target_score: 0.95

# Context Management
context:
  max_experiments_in_context: 20
  compression_threshold: 50

# Storage
storage:
  ledger_file: "experiment_ledger.json"
  dataset_file: "generated_dataset.json"
  results_dir: "results"
  checkpoint_interval: 10
